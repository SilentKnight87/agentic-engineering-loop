repos:
  - repo: local
    hooks:
      - id: privacy-security-scan
        name: privacy/security scan
        entry: python3 scripts/privacy_scan.py --staged
        language: system
        pass_filenames: false
      - id: no-private-keys
        name: block private keys
        entry: bash -c 'if git diff --cached --name-only | xargs grep -I -n "BEGIN .*PRIVATE KEY"; then exit 1; fi'
        language: system
        pass_filenames: false
